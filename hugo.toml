paginate = 4
baseURL = "https://ch0992.github.io/linknest-blog/"
languageCode = "ko-kr"
title = "LinkNest"
theme = "PaperMod"

[params]
  defaultTheme = "dark"
  description = "LinkNest Technical Blog"
  author = "LinkNest"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  disableSpecial1stPost = true
  showDescription = true

  [params.profileMode]
    enabled = true
    title = "LinkNest"
    subtitle = "기술과 연결을 탐구하는 LinkNest의 기술 블로그입니다."
    imageUrl = "/images/linknest-logo.png"
    imageTitle = "LinkNest Logo"
    imageWidth = 150
    imageHeight = 150

    [[params.profileMode.buttons]]
      name = "Posts"
      url = "/posts"
    [[params.profileMode.buttons]]
      name = "About"
      url = "/about"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/ch0992/LinkNest"

[menu]
  [[menu.main]]
    name = "News"
    url = "/categories/news/"
    weight = 10
  [[menu.main]]
    name = "Tech"
    url = "/categories/tech/"
    weight = 20
  [[menu.main]]
    name = "Cloud"
    url = "/categories/cloud/"
    weight = 25
  [[menu.main]]
    name = "All Posts"
    url = "/posts/"
    weight = 30
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 40

