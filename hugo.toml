paginate = 4
baseURL = "https://ch0992.github.io/techblog/"
languageCode = "ko-kr"
title = "Yeong Gyu Choi"
theme = "PaperMod"

[params]
  defaultTheme = "dark"
  description = "Personal Tech Blog by Yeong Gyu Choi"
  author = "Yeong Gyu Choi"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  disableSpecial1stPost = true
  showDescription = true

  [params.profileMode]
    enabled = true
    title = "Yeong Gyu Choi"
    subtitle = "개발하면서 배운 것들을 기록하는 개인 기술 블로그입니다."
    imageUrl = "/images/profile.png"
    imageTitle = "Yeong Gyu Choi"
    imageWidth = 150
    imageHeight = 150

    [[params.profileMode.buttons]]
      name = "Posts"
      url = "/posts"
    [[params.profileMode.buttons]]
      name = "About"
      url = "/about"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/ch0992"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/yeong-gyu-choi-32355b174/"

[menu]
  [[menu.main]]
    name = "All Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 20

