paginate = 4
baseURL = "https://ch0992.github.io/techblog/"
languageCode = "en-us"
title = "Ethan Choi"
theme = "PaperMod"

[params]
  defaultTheme = "dark"
  description = "Personal Tech Blog by Ethan Choi"
  author = "Ethan Choi"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  disableSpecial1stPost = true
  showDescription = true

  [params.profileMode]
    enabled = true
    title = "Ethan Choi"
    subtitle = "Documenting what I learn in Cloud, DevOps, and AI."
    imageUrl = "/techblog/images/icons/logo_icon.png"
    imageTitle = "Ethan Choi"
